<title>Happy Birthday 🌹</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English:ital@1&family=Playfair+Display:ital,wght@1,400;1,500&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #07030a;
    cursor: none;
    user-select: none;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 50% 60%, transparent 20%, rgba(3,1,5,0.8) 100%);
    pointer-events: none; z-index: 998;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 18% 40%, rgba(110,15,45,0.13) 0%, transparent 55%),
      radial-gradient(ellipse at 82% 20%, rgba(80,10,35,0.11) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 88%, rgba(25,55,25,0.09) 0%, transparent 42%);
    pointer-events: none; z-index: 0;
  }
  canvas#stars { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

  #cursor {
    position: fixed;
    width: 20px; height: 20px;
    border: 1px solid rgba(200,170,110,0.5);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none; z-index: 9999;
    transition: width .14s, height .14s, border-color .25s;
  }
  #cursor::after {
    content: ''; position: absolute; inset: 5px;
    background: rgba(228,198,135,0.42); border-radius: 50%;
  }
  body.clicking #cursor { width: 11px; height: 11px; border-color: rgba(230,80,70,0.85); }

  #hdr {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 100; padding: 2.8rem 2rem 1rem;
    text-align: center; pointer-events: none;
  }
  #hdr h1 {
    font-family: 'Cinzel Decorative', serif; font-weight: 400;
    font-size: clamp(1rem, 2.2vw, 1.85rem);
    letter-spacing: .55em; color: #c9a96e;
    text-shadow: 0 0 80px rgba(201,169,110,.55), 0 0 22px rgba(201,169,110,.25);
    opacity: 0; animation: riseIn 2s cubic-bezier(.16,1,.3,1) .4s forwards;
  }
  #hdr p {
    font-family: 'IM Fell English', serif; font-style: italic;
    font-size: clamp(.7rem, 1.2vw, .92rem);
    color: rgba(228,198,135,.38); margin-top: .55rem; letter-spacing: .06em;
    opacity: 0; animation: riseIn 2s cubic-bezier(.16,1,.3,1) 1.1s forwards;
  }
  #hint {
    position: fixed; bottom: 2.8rem; left: 50%;
    transform: translateX(-50%); z-index: 100;
    font-family: 'IM Fell English', serif; font-style: italic;
    font-size: .72rem; letter-spacing: .28em;
    color: rgba(201,169,110,.28); pointer-events: none;
    opacity: 0;
    animation: riseIn 2.2s ease 2.2s forwards, bobble 5s ease-in-out 2.2s infinite;
  }
  .msg {
    position: fixed; pointer-events: none; z-index: 600;
    top: 7.5rem; left: 50%; transform: translateX(-50%);
    white-space: nowrap;
  }
  .msg-card {
    display: inline-block; padding: .85rem 1.8rem;
    background: rgba(6,2,9,.86); border: 1px solid rgba(201,169,110,.22);
    max-width: 340px; white-space: normal; text-align: center;
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    position: relative;
  }
  .msg-card::before {
    content: ''; position: absolute; inset: 3px;
    border: 1px solid rgba(201,169,110,.07); pointer-events: none;
  }
  .msg-ornament { font-size: .48rem; color: rgba(201,169,110,.45); letter-spacing: .3em; margin-bottom: .38rem; display: block; }
  .msg-text {
    font-family: 'Playfair Display', serif; font-style: italic;
    font-size: .87rem; line-height: 1.6; color: rgba(238,218,188,.92);

  @keyframes bobble { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(-8px)} }

<div id="hdr">
  <h1>HAPPY BIRTHDAY</h1>
  <p>May your day be as bright as your smile!</p>
</div>
<div id="hint">&#10022; &nbsp; click anywhere to bloom &nbsp; &#10022;</div>

const NS = 'http://www.w3.org/2000/svg';

// ── Stars ─────────────────────────────────────────────────────────────────
const sc = document.getElementById('stars');
const sx = sc.getContext('2d');
let stars = [];
function initStars() {
  sc.width = innerWidth; sc.height = innerHeight;
  stars = Array.from({length:200},()=>({
    x:Math.random()*sc.width, y:Math.random()*sc.height,
    r:Math.random()*.75+.1, base:Math.random()*.38+.04,
    ph:Math.random()*Math.PI*2, sp:Math.random()*.4+.15
  }));
}
initStars(); addEventListener('resize', initStars);
let sT=0;
(function tick(){
  sx.clearRect(0,0,sc.width,sc.height); sT+=.012;
  stars.forEach(s=>{
    const a=s.base+(1-s.base)*.38*(1+Math.sin(sT*s.sp+s.ph));
    sx.beginPath(); sx.arc(s.x,s.y,s.r,0,Math.PI*2);
    sx.fillStyle=`rgba(218,198,160,${a})`; sx.fill();
  });
  requestAnimationFrame(tick);
})();

// ── Cursor ────────────────────────────────────────────────────────────────
const cur = document.getElementById('cursor');
document.addEventListener('mousemove', e=>{ cur.style.left=e.clientX+'px'; cur.style.top=e.clientY+'px'; });
document.addEventListener('mousedown',()=>document.body.classList.add('clicking'));
document.addEventListener('mouseup',()=>document.body.classList.remove('clicking'));

// ── Messages ──────────────────────────────────────────────────────────────
const MSGS = [

  "You are the poem I never knew how to write,\n and this life is the story I've always wanted to tell.",

  "The difference between a shooting star and you is that when i see a shooting star, I make a wish, but when I see you, I know my wish already came true.",
  "You are really cute and thats not even the best thing about you.",
  "Stop acting suprised when good things happen to you, you're a good persona and deserve all the good things that come your way.",
  "Having outer beauty is amazing, but to have pure inner beauty is rare to find in this world. Thankfully i am lucky to say you possess both.",
  "You are a gift, precious and unique, a ray of sun in the vast expanse of life.",
  "Words like pretty, beautiful, gorgeous, stunning, radiant, and breathtaking arent enough to compliment you. \n Your so beyond that, your beauty is just unexplainable.",
  "You are a human medicine, a remedy for all the pain and suffering in this world, you have a heart of gold and a soul that shines brighter than the stars.",

  "I dont think u  understand how beautiful u make the world, just by existing in it.",
  "Your soul makes the world feel softer, your presence makes the world feel warmer, and your smile makes the world feel brighter.",
];
let lastM=-1;
function pickMsg(){ let i; do{i=Math.floor(Math.random()*MSGS.length)}while(i===lastM); lastM=i; return MSGS[i]; }

function showMsg(){
  const el=document.createElement('div'); el.className='msg';
  el.innerHTML=`<div class="msg-card"><span class="msg-ornament">&#10022; &#10022; &#10022;</span><div class="msg-text">${pickMsg()}</div><div class="msg-rule"></div></div>`;
  document.body.appendChild(el);
  gsap.fromTo(el,{opacity:0,y:-10},{opacity:1,y:0,duration:.9,ease:'power2.out'});
  gsap.to(el,{opacity:0,duration:1.0,delay:7.0,ease:'power2.in',onComplete:()=>el.remove()});
}

// ── Helpers ────────────────────────────────────────────────────────────────
function rnd(a,b){return a+Math.random()*(b-a);}
function svgEl(tag,attrs){
  const e=document.createElementNS(NS,tag);
  if(attrs) for(const[k,v] of Object.entries(attrs)) e.setAttribute(k,v);
  return e;
}
function bezierPt(p0,p1,p2,p3,t){
  const m=1-t;
  return{x:m*m*m*p0.x+3*m*m*t*p1.x+3*m*t*t*p2.x+t*t*t*p3.x,
         y:m*m*m*p0.y+3*m*m*t*p1.y+3*m*t*t*p2.y+t*t*t*p3.y};
}
function bezierTan(p0,p1,p2,p3,t){
  const m=1-t;
  return{x:3*(m*m*(p1.x-p0.x)+2*m*t*(p2.x-p1.x)+t*t*(p3.x-p2.x)),
         y:3*(m*m*(p1.y-p0.y)+2*m*t*(p2.y-p1.y)+t*t*(p3.y-p2.y))};
}
function normV(v){const l=Math.sqrt(v.x*v.x+v.y*v.y)||1;return{x:v.x/l,y:v.y/l};}
function bezierLen(p0,p1,p2,p3){
  let len=0,prev=p0;
  for(let i=1;i<=30;i++){
    const c=bezierPt(p0,p1,p2,p3,i/30);
    len+=Math.sqrt((c.x-prev.x)**2+(c.y-prev.y)**2); prev=c;
  }
  return len;
}

// ── Thorn shape ────────────────────────────────────────────────────────────
function thornD(sz){
  const b=sz*.27;
  return `M 0,0 C ${-b},${-sz*.1} ${-b*.65},${-sz*.62} 0,${-sz} C ${b*.22},${-sz*.8} ${b*1.22},${-sz*.48} ${b*.52},${-sz*.14} Z`;
}

// ── Spawn Rose ────────────────────────────────────────────────────────────
let uid=0;

function spawnRose(clickX, clickY){
  uid++;
  const screenH = innerHeight;

  // S-curve bezier stem — ends just below the rose petal base
  const lean = rnd(-16, 16);
  const bx   = clickX + lean;
  const dir  = lean >= 0 ? 1 : -1;
  const stemH = screenH - clickY;
  const p0 = { x: clickX, y: screenH };
  const p1 = { x: clickX + dir*rnd(58,88), y: screenH - stemH*rnd(0.18,0.3) };
  const p2 = { x: bx - dir*rnd(48,72),    y: clickY + stemH*rnd(0.22,0.36) };
  const p3 = { x: bx, y: clickY + 43 };  // connects to rose petal base
  const sLen  = bezierLen(p0,p1,p2,p3);
  const stemD = `M ${p0.x},${p0.y} C ${p1.x},${p1.y} ${p2.x},${p2.y} ${p3.x},${p3.y}`;

  // ── Create full-screen SVG wrapper ──────────────────────────────────────
  const svg = svgEl('svg');
  svg.style.cssText='position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:10;overflow:visible;';

  // Shared defs (stem gradient + drop-shadow filters)
  const defs = svgEl('defs');
  defs.innerHTML = `
    <linearGradient id="sG${uid}" gradientUnits="objectBoundingBox" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1c4220"/>
      <stop offset="45%" stop-color="#3d7240"/>
      <stop offset="100%" stop-color="#163818"/>
    </linearGradient>
    <filter id="tF${uid}">
      <feDropShadow dx=".7" dy="1" stdDeviation=".9" flood-color="rgba(0,0,0,.7)"/>
    </filter>`;
  svg.appendChild(defs);

  // ── Stem Group: contains stem, thorns, leaves ──────────────────────────
  const stemGroup = svgEl('g');

  // Stem
  const stemSh = svgEl('path',{d:stemD,fill:'none',stroke:'rgba(0,0,0,.35)','stroke-width':'6.2','stroke-linecap':'round',transform:'translate(2,4)'});
  const stemMn = svgEl('path',{d:stemD,fill:'none',stroke:'#3a6640','stroke-width':'4.2','stroke-linecap':'round'});
  const stemHl = svgEl('path',{d:stemD,fill:'none',stroke:'rgba(100,185,90,.18)','stroke-width':'1.8','stroke-linecap':'round',transform:'translate(-1,-1)'});
  gsap.set([stemSh,stemMn,stemHl],{strokeDasharray:sLen,strokeDashoffset:sLen});
  stemGroup.appendChild(stemSh); stemGroup.appendChild(stemMn); stemGroup.appendChild(stemHl);

  // Thorns
  const THORN_TS=[0.10,0.18,0.26,0.34,0.42,0.50,0.58,0.66,0.74,0.82];
  const thornEls=[];
  THORN_TS.forEach((t,i)=>{
    const pt  = bezierPt(p0,p1,p2,p3,t);
    const tan = bezierTan(p0,p1,p2,p3,t);
    const tn  = normV(tan);
    const perp= {x:-tn.y,y:tn.x};
    const side= i%2===0?1:-1;
    const sz  = rnd(8,14);
    const tx2 = perp.x*side - tn.x*.28;
    const ty2 = perp.y*side - tn.y*.28;
    const ang = Math.atan2(ty2,tx2)*180/Math.PI-90;
    const tg  = svgEl('g',{transform:`translate(${pt.x},${pt.y}) rotate(${ang})`,filter:`url(#tF${uid})`});
    tg.appendChild(svgEl('path',{d:thornD(sz),fill:'#192e1c',stroke:'#0c1e10','stroke-width':'0.3'}));
    stemGroup.appendChild(tg);
    thornEls.push({el:tg,pt});
    gsap.set(tg,{scale:0,svgOrigin:`${pt.x} ${pt.y}`});
  });

  // Leaves
  function leafD(sz,dir=1){
    return `M0,0 C${sz*0.7*dir},${-sz*0.2} ${sz*0.9*dir},${-sz*0.8} 0,${-sz} C${-sz*0.7*dir},${-sz*0.2} ${-sz*0.9*dir},${-sz*0.8} 0,0 Z`;
  }
  const LEAF_TS = [rnd(0.22,0.28), rnd(0.38,0.44), Math.random()<0.5 ? rnd(0.54,0.62) : null].filter(Boolean);
  LEAF_TS.forEach((t,i)=>{
    const pt  = bezierPt(p0,p1,p2,p3,t);
    const tan = bezierTan(p0,p1,p2,p3,t);
    const tn  = normV(tan);
    const perp= {x:-tn.y,y:tn.x};
    const side= i%2===0?1:-1;
    const sz  = rnd(32,44);
    const tx2 = perp.x*side*1.2;
    const ty2 = perp.y*side*1.2;
    const ang = Math.atan2(ty2,tx2)*180/Math.PI-90 + rnd(-18,18);
    const g = svgEl('g',{transform:`translate(${pt.x},${pt.y}) rotate(${ang})`,filter:`url(#tF${uid})`});
    const leaf = svgEl('path',{
      d:leafD(sz,side),
      fill:'#00ff55',
      stroke:'#2d4c1c',
      'stroke-width':'1.2',
      opacity:'1.0'
    });
    g.appendChild(leaf);
    stemGroup.appendChild(g);
    gsap.set(g,{scale:0,svgOrigin:`0 0`});
    gsap.to(g,{scale:1,svgOrigin:`0 0`,duration:0.38,delay:0.7+0.18*i,ease:'back.out(2.2)'});
  });

  svg.appendChild(stemGroup);

  // ── Parse the artistic rose SVG ─────────────────────────────────────────
  const parser = new DOMParser();
  const rDoc   = parser.parseFromString(ROSE_MARKUP, 'image/svg+xml');

  // Move defs from parsed rose into this SVG's defs
  const roseDefs = rDoc.querySelector('defs');
  if(roseDefs){
    for(const child of [...roseDefs.children]){
      defs.appendChild(document.adoptNode(child));
    }
  }

  // Positioning: center the rose head (approx SVG centre 88,105) at clickX,clickY
  // At scale=0.85: offset = (88*0.85, 105*0.85) ≈ (75, 89)
  const SCALE = 0.85;
  const tx = bx - 75;
  const ty = clickY - 89;

  // posG = handles translate+scale (static)
  const posG = svgEl('g',{transform:`translate(${tx},${ty}) scale(${SCALE})`});
  // bloomG = animated group, starts at scale 0
  const bloomG = svgEl('g',{filter:'url(#roseGlow)'});

  // Move rose paths into bloomG
  for(const path of [...rDoc.querySelectorAll('path')]){
    bloomG.appendChild(document.adoptNode(path));
  }

  posG.appendChild(bloomG);
  svg.appendChild(posG);
  document.body.appendChild(svg);

  // ── GSAP Timeline ────────────────────────────────────────────────────────
  // Petal base in SVG viewport coords: (tx + 88*SCALE, ty + 158*SCALE) ≈ (bx-0.2, clickY+45)
  const svgOrig = `${(tx + 88*SCALE).toFixed(1)} ${(ty + 158*SCALE).toFixed(1)}`;

  gsap.set(bloomG,{scale:0,svgOrigin:"88 158"});

  const tl = gsap.timeline({
    onComplete(){
      // Gentle shimmer pulse on the rose head
      gsap.to(bloomG,{opacity:0.88,duration:1.8,repeat:-1,yoyo:true,ease:'sine.inOut'});
    }
  });

  // 1. Stem draws upward
  tl.to([stemSh,stemMn,stemHl],{strokeDashoffset:0,duration:1.15,ease:'power2.inOut'},0);

  // 2. Thorns pop along stem as it grows
  thornEls.forEach(({el,pt},i)=>{
    tl.to(el,{scale:1,svgOrigin:`${pt.x} ${pt.y}`,duration:0.2,ease:'back.out(2.8)'},0.1+i*0.12);
  });

  // 3. Rose head grows smoothly from stem tip — same feel as the stem draw
  tl.to(bloomG,{scale:1,svgOrigin:"88 158",duration:1.1,ease:'power2.inOut'},1.05);

  // 4. Trigger SMIL morphing (petals open slowly over 12s)
  tl.call(()=>{
    bloomG.querySelectorAll('animate').forEach(a=>{ try{a.beginElement();}catch(e){} });
    bloomParticles(svg, bx, clickY - 15);
  },null,1.55);

  // Fade the whole rose after a while
  gsap.to(svg,{opacity:0,duration:1.8,delay:rnd(10,13),ease:'power2.inOut',onComplete:()=>svg.remove()});
}

// ── Particle burst ──────────────────────────────────────────────────────────
function bloomParticles(svg,cx,cy){
  const COLORS=['rgba(255,80,80,0.88)','rgba(220,50,50,0.7)','rgba(240,200,130,0.85)','rgba(255,120,100,0.75)'];
  for(let i=0;i<20;i++){
    const isGold=i%4===0;
    const angle=(i/20)*Math.PI*2+rnd(-.3,.3);
    const dist=rnd(28,90);
    const sz=rnd(2.5,6.5);
    const ex=cx+Math.cos(angle)*dist;
    const ey=cy+Math.sin(angle)*dist-rnd(12,50);
    const el=i%3===0
      ?svgEl('ellipse',{cx,cy,rx:sz*.52,ry:sz,fill:COLORS[isGold?2:0],transform:`rotate(${rnd(0,360)} ${cx} ${cy})`})
      :svgEl('circle',{cx,cy,r:sz*.42,fill:COLORS[isGold?2:i%2===0?0:1]});
    svg.appendChild(el);
    gsap.to(el,{x:ex-cx,y:ey-cy,opacity:0,scale:rnd(.1,.65),duration:rnd(1,2.5),ease:'power2.out',delay:rnd(0,.2),onComplete:()=>el.remove()});
  }
}

// ── Click handler ────────────────────────────────────────────────────────────
let hinted=false;
document.addEventListener('click',e=>{
  if(!hinted){gsap.to('#hint',{opacity:0,duration:.6});hinted=true;}
  spawnRose(e.clientX,e.clientY);
  showMsg();
});
